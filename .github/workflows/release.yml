name: Build Release

"on":
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-mac:
    environment: MACOS
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: arm64
          - os: macos-13
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and Publish Mac
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET }}
        run: npm run build:mac -- --${{ matrix.arch }} --publish

  build-windows:
    environment: MACOS
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        env:
          ELECTRON_MIRROR: https://artifacts.electronjs.org/download/
          ELECTRON_DOWNLOAD_HOST: https://artifacts.electronjs.org/
          ELECTRON_CUSTOM_DIR: v{{version}}
          ELECTRON_CUSTOM_FILENAME: electron-v{{version}}-{{platform}}-{{arch}}.zip
          ELECTRON_BUILDER_BINARIES_MIRROR: https://github.com/electron-userland/electron-builder-binaries/releases/download/
        run: npm install
      - name: Debug Electron download URL
        if: always()
        run: node -e "const v=require('electron/package.json').version;const p=process.platform;const a=process.arch;const mirror=process.env.ELECTRON_MIRROR||'https://artifacts.electronjs.org/download/';const url=`${mirror}v${v}/electron-v${v}-${p}-${a}.zip`;console.log('Electron download URL:',url)"

      - name: Build and Publish Windows
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET }}
        run: npm run build -- --win --publish always

  build-linux:
    environment: MACOS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        env:
          ELECTRON_MIRROR: https://artifacts.electronjs.org/download/
          ELECTRON_DOWNLOAD_HOST: https://artifacts.electronjs.org/
          ELECTRON_CUSTOM_DIR: v{{version}}
          ELECTRON_CUSTOM_FILENAME: electron-v{{version}}-{{platform}}-{{arch}}.zip
          ELECTRON_BUILDER_BINARIES_MIRROR: https://github.com/electron-userland/electron-builder-binaries/releases/download/
        run: npm install
      - name: Debug Electron download URL
        if: always()
        run: node -e "const v=require('electron/package.json').version;const p=process.platform;const a=process.arch;const mirror=process.env.ELECTRON_MIRROR||'https://artifacts.electronjs.org/download/';const url=`${mirror}v${v}/electron-v${v}-${p}-${a}.zip`;console.log('Electron download URL:',url)"

      - name: Build and Publish Linux
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET }}
        run: npm run build -- --linux --publish always
